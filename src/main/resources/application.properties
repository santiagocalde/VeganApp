# =============================================================
# VeganApp — application.properties
# Configuración base. Los valores sensibles vienen de .env
# NO commitear valores reales de producción en este archivo
# =============================================================

# ─── Perfil activo ────────────────────────────────────────────
spring.profiles.active=${SPRING_PROFILE:dev}

# ─── Servidor ─────────────────────────────────────────────────
server.port=${SERVER_PORT:8080}
server.servlet.context-path=/
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/plain
server.compression.min-response-size=1024

# ─── Datasource (MySQL) ───────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/veganapp?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8}
spring.datasource.username=${DB_USERNAME:veganapp_user}
spring.datasource.password=${DB_PASSWORD:dev_password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── Connection Pool (HikariCP — viene con Spring Boot) ───────
spring.datasource.hikari.pool-name=VeganAppPool
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000
# Valida la conexión antes de usarla — evita stale connections
spring.datasource.hikari.connection-test-query=SELECT 1

# ─── JPA / Hibernate ──────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.open-in-view=false

# ─── Redis ────────────────────────────────────────────────────
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=2000ms
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=2
spring.data.redis.lettuce.pool.max-wait=1000ms

# ─── JWT + Seguridad ──────────────────────────────────────────
app.jwt.secret=${JWT_SECRET:dev_secret_que_debe_tener_al_menos_256_bits_de_longitud_para_hs256}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:900000}
app.jwt.refresh-expiration-days=${JWT_REFRESH_EXPIRATION_DAYS:30}

# ─── Firebase FCM (notificaciones push) ───────────────────────
app.fcm-server-key=${FCM_SERVER_KEY:}

# ─── Resend API (email transaccional) ─────────────────────────
app.resend.api-key=${RESEND_API_KEY:}
app.resend.from=${RESEND_FROM:hola@veganapp.com}

# ─── S3 / MinIO (almacenamiento) ──────────────────────────────
app.s3.endpoint=${S3_ENDPOINT:http://localhost:9000}
app.s3.access-key=${S3_ACCESS_KEY:minioadmin}
app.s3.secret-key=${S3_SECRET_KEY:minioadmin}
app.s3.bucket=${S3_BUCKET:veganapp-assets}

# ─── Lógica de negocio ────────────────────────────────────────
app.base-points=${APP_BASE_POINTS:10}
app.max-streak-pauses-per-month=${APP_MAX_PAUSES:2}

# ─── Spring Actuator (observabilidad) ─────────────────────────
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoints.web.base-path=/actuator
management.endpoint.health.show-details=when-authorized
management.endpoint.health.show-components=when-authorized
management.metrics.export.prometheus.enabled=true
management.metrics.tags.application=veganapp
# No exponer el actuator en el mismo puerto en producción
# management.server.port=8081

# ─── Jackson (serialización JSON) ─────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.serialization.fail-on-empty-beans=false
spring.jackson.deserialization.fail-on-unknown-properties=false
spring.jackson.default-property-inclusion=non_null
spring.jackson.time-zone=UTC

# ─── Async (para @Async en BadgeTriggerService, EmailService, etc.) ──
spring.task.execution.pool.core-size=4
spring.task.execution.pool.max-size=16
spring.task.execution.pool.queue-capacity=100
spring.task.execution.thread-name-prefix=veganapp-async-

# ─── Scheduler (para @Scheduled en StreakReminderScheduler) ───
spring.task.scheduling.pool.size=4
spring.task.scheduling.thread-name-prefix=veganapp-scheduler-

# ─── Multipart (para subida de imágenes de perfil, share cards) ──
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# ═════════════════════════════════════════════════════════════════════════════
# ──── SPRINT 2: SIR PIPPIN, BADGES, PLATE, NOTIFICATIONS ────────────────────
# ═════════════════════════════════════════════════════════════════════════════

# ─── Sir Pippin — Configuración de mensajes ────────────────────
app.pippin.messages-path=${PIPPIN_MESSAGES_PATH:classpath:pippin/messages_es.json}
app.pippin.messages-cache-ttl-minutes=${PIPPIN_CACHE_TTL:1440}
app.pippin.last-message-ttl-hours=${PIPPIN_LAST_MSG_TTL:25}
app.pippin.animation-default=${PIPPIN_ANIMATION_DEFAULT:idle}
# Fallback si Redis falla: usar random simple
app.pippin.redis-fallback-enabled=true

# ─── Badges — Configuración de hitos ───────────────────────────
app.badge.streak-milestones=${BADGE_MILESTONES:3,7,14,30,60,100,180,365}
app.badge.async-thread-pool-size=5
app.badge.async-queue-capacity=100

# ─── Plate Builder — Umbrales nutricionales ────────────────────
app.plate.min-calories=${PLATE_MIN_CALORIES:350}
app.plate.max-calories=${PLATE_MAX_CALORIES:750}
app.plate.min-protein-g=${PLATE_MIN_PROTEIN:15}
app.plate.max-fat-g=${PLATE_MAX_FAT:28}

# ─── Notifications — Configuración de recordatorios ───────────
app.notification.reminder-hour-start=${NOTIF_REMINDER_START:20:00}
app.notification.reminder-hour-end=${NOTIF_REMINDER_END:21:00}
app.notification.max-failure-rate-alert=${NOTIF_FAILURE_RATE:0.5}
app.notification.retry-max-attempts=${NOTIF_RETRY_ATTEMPTS:3}
app.notification.retry-delay-seconds=${NOTIF_RETRY_DELAY:5}

# ─── Logging ──────────────────────────────────────────────────
logging.level.root=INFO
logging.level.com.veganapp=DEBUG
logging.level.com.veganapp.common.security=DEBUG
logging.level.com.veganapp.streak=DEBUG
logging.level.com.veganapp.pippin=DEBUG
logging.level.com.veganapp.badge=DEBUG
logging.level.com.veganapp.plate=DEBUG
logging.level.com.veganapp.notification=DEBUG
logging.level.org.hibernate=WARN
logging.level.org.springframework.web=INFO
logging.level.org.springframework.data.redis=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n